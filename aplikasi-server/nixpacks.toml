# Nixpacks configuration for SpecWeave Backend
# This file tells Railway how to build and run the backend server

[phases.setup]
# Add gcc and glibc for C++ libraries needed by NumPy/PyTorch
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc", "glibc"]

[phases.install]
cmds = [
  "npm ci --production=false"
]

[phases.build]
cmds = [
  # Install Python dependencies from requirements.txt
  "pip3 install --user --break-system-packages -r src/python/requirements.txt",
  # Download NLTK data (including punkt_tab for newer NLTK versions)
  "python3 -c \"import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('wordnet'); nltk.download('omw-1.4')\""
]

[start]
# Set LD_LIBRARY_PATH to include glibc lib directory before starting
cmd = "export LD_LIBRARY_PATH=/nix/store/*-glibc-*/lib:$LD_LIBRARY_PATH && npm start"
