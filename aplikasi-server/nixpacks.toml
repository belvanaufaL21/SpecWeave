# Nixpacks configuration for SpecWeave Backend
[phases.setup]
# Include essential build tools and Python
nixPkgs = [
  "nodejs_20",
  "python311",
  "python311Packages.pip",
  "gcc-unwrapped",
  "zlib",
  "glibc"
]

[phases.install]
cmds = [
  "npm ci --production=false"
]

[phases.build]
cmds = [
  # Install Python dependencies (numpy 1.26.4 pinned for compatibility)
  "pip3 install --user --break-system-packages -r src/python/requirements.txt",
  # Download NLTK data for METEOR
  "python3 -c \"import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('wordnet'); nltk.download('omw-1.4')\"",
  # Pre-download Sentence-BERT model to avoid runtime timeout
  "python3 -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('paraphrase-multilingual-MiniLM-L12-v2')\" || echo 'Model pre-download failed, will download at runtime'"
]

[start]
# Simple start - LD_LIBRARY_PATH is handled in Node.js spawn
cmd = "npm start"

[variables]
PYTHONPATH = "/root/.local/lib/python3.11/site-packages"
