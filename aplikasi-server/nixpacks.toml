# Nixpacks configuration for SpecWeave Backend
# This file tells Railway how to build and run the backend server

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci --production=false"
]

[phases.build]
cmds = [
  "pip3 install --user --break-system-packages torch --index-url https://download.pytorch.org/whl/cpu",
  "pip3 install --user --break-system-packages sentence-transformers nltk scikit-learn",
  "python3 -c \"import nltk; nltk.download('wordnet'); nltk.download('omw-1.4')\""
]

[start]
cmd = "npm start"
