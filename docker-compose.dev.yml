# ============================================================================
# SpecWeave Docker Compose - Development Overrides
# ============================================================================
# This file contains development-specific overrides for hot-reload and debugging.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================================

services:
  # ==========================================================================
  # Frontend Service - Development Mode with Vite Dev Server
  # ==========================================================================
  frontend:
    build:
      context: ./aplikasi-klien
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Bind mount source code for hot-reload
      - ./aplikasi-klien/src:/app/src:delegated
      - ./aplikasi-klien/public:/app/public:delegated
      - ./aplikasi-klien/index.html:/app/index.html:delegated
      - ./aplikasi-klien/vite.config.js:/app/vite.config.js:delegated
      - ./aplikasi-klien/postcss.config.js:/app/postcss.config.js:delegated
      - ./aplikasi-klien/tailwind.config.js:/app/tailwind.config.js:delegated
      # Exclude node_modules from bind mount (use container's version)
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5003}
    command: npm run dev -- --host 0.0.0.0
    labels:
      - "com.specweave.service=frontend"
      - "com.specweave.environment=development"
      - "com.specweave.log-aggregation=enabled"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.specweave.service,com.specweave.environment"
        tag: "{{.Name}}/{{.ID}}"

  # ==========================================================================
  # Backend Service - Development Mode with Nodemon
  # ==========================================================================
  backend:
    build:
      context: ./aplikasi-server
      dockerfile: Dockerfile.dev
    volumes:
      # Bind mount source code for hot-reload
      - ./aplikasi-server:/app:delegated
      # Exclude node_modules from bind mount (use container's version)
      - /app/node_modules
      # Keep named volumes for data persistence
      - backend-logs:/app/logs
      - nltk-data:/root/nltk_data
      - torch-models:/root/.cache/torch
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-5003}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JIRA_ENCRYPTION_KEY=${JIRA_ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_CONSOLE_LOGS=true
      - HEALTH_CHECK_VERBOSE=false
      - HEALTH_CHECK_LOG_LEVEL=error
    command: npm run dev
    labels:
      - "com.specweave.service=backend"
      - "com.specweave.environment=development"
      - "com.specweave.log-aggregation=enabled"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "com.specweave.service,com.specweave.environment"
        tag: "{{.Name}}/{{.ID}}"

# ==========================================================================
# Volumes (inherited from base, no changes needed)
# ==========================================================================
volumes:
  backend-logs:
  nltk-data:
  torch-models:
