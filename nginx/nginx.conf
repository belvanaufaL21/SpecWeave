# ============================================================================
# Nginx Main Configuration for SpecWeave Production
# ============================================================================
# This is the main nginx configuration with worker processes, gzip compression,
# rate limiting, and logging configuration.
# ============================================================================

user nginx;
# Performance: Auto-detect optimal worker processes (one per CPU core)
worker_processes auto;
# Output error logs to stderr for Docker logging driver
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    # Performance: Optimize worker connections and event handling
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # Logging Configuration with Performance Metrics
    # ========================================================================
    # Structured log format with request ID and performance metrics
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format performance '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Structured JSON log format for better parsing and monitoring
    log_format json_combined escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$request_id",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    # Output access logs to stdout for Docker logging driver
    access_log /dev/stdout json_combined;

    # ========================================================================
    # Performance Optimization
    # ========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ========================================================================
    # Gzip Compression
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        application/rss+xml
        application/atom_xml;
    gzip_disable "MSIE [1-6]\.";

    # ========================================================================
    # Rate Limiting Zones
    # ========================================================================
    # Limit requests to 100 per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    
    # Limit connections to 10 per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ========================================================================
    # Upstream Definitions
    # ========================================================================
    # Performance: Configure upstream servers with keepalive connections
    upstream frontend {
        server frontend:80;
        # Enable keepalive connections for connection pooling
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    upstream backend {
        server backend:5003;
        # Enable keepalive connections for connection pooling
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    # ========================================================================
    # Include Server Configurations
    # ========================================================================
    include /etc/nginx/conf.d/*.conf;
}
