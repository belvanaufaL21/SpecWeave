# ============================================================================
# SpecWeave Docker Compose - Production Overrides
# ============================================================================
# This file contains production-specific configuration with Nginx reverse proxy,
# SSL support, and resource limits.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

services:
  # ==========================================================================
  # Nginx Reverse Proxy - Production Entry Point
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: specweave-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration files
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (mount if available)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - specweave-network
    depends_on:
      - frontend
      - backend
    environment:
      - NGINX_HOST=${DOMAIN:-localhost}
      - NGINX_PORT=80
    # Security: Read-only root filesystem with writable tmpfs
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755
      - /tmp:mode=0755
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.specweave.service=nginx"
      - "com.specweave.environment=production"
      - "com.specweave.log-aggregation=enabled"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.specweave.service,com.specweave.environment"
        tag: "{{.Name}}/{{.ID}}"

  # ==========================================================================
  # Frontend Service - Production Mode
  # ==========================================================================
  frontend:
    build:
      context: ./aplikasi-klien
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    environment:
      - NODE_ENV=production
    # Remove port exposure - only accessible via nginx
    ports: []
    # Security: Read-only root filesystem with writable tmpfs
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755
      - /tmp:mode=0755
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "com.specweave.service=frontend"
      - "com.specweave.environment=production"
      - "com.specweave.log-aggregation=enabled"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.specweave.service,com.specweave.environment"
        tag: "{{.Name}}/{{.ID}}"

  # ==========================================================================
  # Backend Service - Production Mode
  # ==========================================================================
  backend:
    build:
      context: ./aplikasi-server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5003}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLIENT_URL=${CLIENT_URL:-https://${DOMAIN:-localhost}}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JIRA_ENCRYPTION_KEY=${JIRA_ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_CONSOLE_LOGS=true
      - CLEAN_LOGS=true
      # Performance: Node.js heap size optimization (75% of container memory)
      - NODE_OPTIONS=--max-old-space-size=3072 --max-semi-space-size=64
    # Remove port exposure - only accessible via nginx
    ports: []
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    volumes:
      - backend-logs:/app/logs
      - nltk-data:/root/nltk_data
      - torch-models:/root/.cache/torch
    labels:
      - "com.specweave.service=backend"
      - "com.specweave.environment=production"
      - "com.specweave.log-aggregation=enabled"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "com.specweave.service,com.specweave.environment"
        tag: "{{.Name}}/{{.ID}}"

# ==========================================================================
# Volumes (inherited from base, no changes needed)
# ==========================================================================
volumes:
  backend-logs:
  nltk-data:
  torch-models:
