<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#faviconGradient)"/>
  
  <!-- Main weave pattern -->
  <g fill="white">
    <!-- S shape (left part) -->
    <path d="M16 20 C16 16, 20 12, 24 12 L28 12 C32 12, 36 16, 36 20 C36 24, 32 28, 28 28 L24 28 C20 28, 16 32, 16 36 C16 40, 20 44, 24 44 L28 44" 
          stroke="white" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- W shape (right part) -->
    <path d="M36 16 L40 48 L44 24 L48 48 L52 16" 
          stroke="white" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Weave connecting dots -->
    <circle cx="24" cy="20" r="2.5" fill="white"/>
    <circle cx="28" cy="36" r="2.5" fill="white"/>
    <circle cx="40" cy="24" r="2.5" fill="white"/>
    <circle cx="48" cy="32" r="2.5" fill="white"/>
  </g>
</svg>