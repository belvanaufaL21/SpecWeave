# Render Blueprint for SpecWeave
# This file defines all services needed for SpecWeave deployment on Render.com
# Documentation: https://render.com/docs/blueprint-spec

services:
  # Backend API Service (Express.js + Python ML)
  - type: web
    name: specweave-backend
    env: docker
    dockerfilePath: ./aplikasi-server/Dockerfile
    dockerContext: ./aplikasi-server
    region: singapore
    plan: starter # Free tier or starter ($7/mo)
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5003
      - key: DATABASE_URL
        fromDatabase:
          name: specweave-db
          property: connectionString
      - key: CLIENT_URL
        value: https://specweave-frontend.onrender.com
      - key: SUPABASE_URL
        sync: false # Set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JIRA_ENCRYPTION_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_PATH
        value: python3

  # Frontend Static Site (React + Vite)
  - type: web
    name: specweave-frontend
    env: static
    buildCommand: cd aplikasi-klien && npm install && npm run build
    staticPublishPath: ./aplikasi-klien/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://specweave-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

# Database (PostgreSQL)
databases:
  - name: specweave-db
    databaseName: specweave
    user: specweave_user
    plan: starter # Free tier (expires after 90 days) or starter ($7/mo)
    region: singapore
